<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obituary Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0C18;
      --surface: rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.10);
      --card-bg: #1C1B2E;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.55);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #E8E6F2;
      --text-muted: rgba(232,230,242,0.65);
      --text-dim: rgba(232,230,242,0.38);
      --radius: 14px;
      --radius-sm: 8px;
      --green: #34D399;
      --green-bg: rgba(52,211,153,0.12);
      --green-border: rgba(52,211,153,0.25);
      --orange: #FB923C;
      --orange-bg: rgba(251,146,60,0.12);
      --orange-border: rgba(251,146,60,0.30);
      --red: #F87171;
      --red-bg: rgba(248,113,113,0.12);
      --red-border: rgba(248,113,113,0.30);
      --blue: #60A5FA;
      --teal: #2DD4BF;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F0EEF8;
        --surface: rgba(0,0,0,0.04);
        --surface-hover: rgba(0,0,0,0.07);
        --card-bg: #FFFFFF;
        --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.18);
        --text: #1C1B2E;
        --text-muted: rgba(28,27,46,0.68);
        --text-dim: rgba(28,27,46,0.42);
        --green-bg: rgba(5,150,105,0.08);
        --green-border: rgba(5,150,105,0.20);
        --orange-bg: rgba(234,88,12,0.08);
        --orange-border: rgba(234,88,12,0.22);
        --red-bg: rgba(220,38,38,0.08);
        --red-border: rgba(220,38,38,0.22);
        --blue: #2563EB;
        --teal: #0D9488;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 20px;
    }

    header {
      max-width: 960px; margin: 0 auto 24px;
      display: flex; align-items: baseline; gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.8rem; color: var(--text-dim); }

    .grid {
      max-width: 960px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    /* Panel header */
    .panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .fh-logo {
      width: 36px; height: 36px; border-radius: 6px;
      object-fit: contain; flex-shrink: 0;
      background: white; padding: 3px;
    }
    .panel-title-group { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .panel-title-link {
      font-size: 1rem; font-weight: 600; color: var(--text);
      text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .panel-title-link:hover { text-decoration: underline; text-underline-offset: 3px; }
    .day-badge { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; color: var(--text-dim); }

    /* Mobile panel collapse */
    .panel-chevron {
      display: none;
      font-size: 1rem; color: var(--text-dim);
      margin-left: 4px; transition: transform 0.2s;
      flex-shrink: 0;
    }
    @media (max-width: 640px) {
      .panel-header { cursor: pointer; user-select: none; }
      .panel-chevron { display: block; }
      .panel-body { display: none; }
      .panel.expanded .panel-body { display: block; }
      .panel.expanded .panel-chevron { transform: rotate(180deg); }
    }
    .summary-badge {
      font-size: 0.75rem; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
    }
    .summary-badge.clean  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .summary-badge.alert  { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .summary-badge.loading { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }

    /* Section labels */
    .week-section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--orange); padding: 10px 14px 3px;
    }
    .older-section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-dim); padding: 10px 14px 3px;
    }

    /* Card list */
    .obit-list { padding: 6px 10px 10px; display: flex; flex-direction: column; gap: 8px; }

    /* Obit card */
    .obit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 12px;
      text-decoration: none; display: block; color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .obit-card:hover { border-color: var(--border-hover); background: var(--surface-hover); }
    .obit-card.recent { background: var(--orange-bg); border-color: var(--orange-border); }
    .obit-card.recent:hover { filter: brightness(1.08); }

    /* Card top: photo + name */
    .obit-header { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .obit-photo {
      width: 44px; height: 56px; object-fit: cover;
      border-radius: 4px; flex-shrink: 0; background: var(--surface);
    }
    .obit-info { flex: 1; min-width: 0; padding-top: 1px; }
    .obit-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; }
    .obit-meta { font-size: 0.72rem; color: var(--text-dim); line-height: 1.5; }

    /* Service table */
    .svc-wrap { overflow-x: auto; margin-top: 2px; }

    .svc-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.74rem; min-width: 260px;
    }

    .svc-table thead th {
      text-align: left; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-dim); padding: 0 6px 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .svc-table thead th:last-child { padding-right: 0; }

    .svc-table tbody tr { border-top: 1px solid var(--border); }
    .svc-table tbody tr:first-child { border-top: none; }

    .svc-table td {
      padding: 5px 6px 5px 0;
      vertical-align: top;
      line-height: 1.4;
    }
    .svc-table td:last-child { padding-right: 0; }

    .svc-type { font-weight: 600; color: var(--text); white-space: nowrap; }
    .svc-date { color: var(--blue); }
    .svc-time { color: var(--teal); white-space: nowrap; }
    .svc-loc  { color: var(--orange); }

    .no-services { font-size: 0.75rem; color: var(--text-dim); font-style: italic; margin-top: 4px; }

    /* Full obituary collapsible */
    .obit-full {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .obit-full summary {
      font-size: 0.71rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text-dim);
      cursor: pointer; user-select: none;
      list-style: none; display: flex; align-items: center; gap: 4px;
    }
    .obit-full summary::-webkit-details-marker { display: none; }
    .obit-full summary::after { content: '▾'; }
    .obit-full[open] summary::after { content: '▴'; }
    .obit-full-text {
      margin-top: 8px;
      font-size: 0.75rem; color: var(--text-muted); line-height: 1.65;
      white-space: pre-wrap;
    }

    .empty-state  { padding: 32px 18px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }
    .error-state  { padding: 20px 18px; font-size: 0.82rem; color: var(--red); }
    .loading-state { padding: 32px 18px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Obituary Checker</h1>
  <span id="last-updated"></span>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-header">
      <img class="fh-logo" src="https://d1q40j6jx1d8h6.cloudfront.net/SiteBuilder/ac386460-9069-4d71-8a48-0a6ab1f5f511/562b11ff-74cb-4d66-b951-c27101f19437_thumbnail.webp" alt="Oakley-Cook logo">
      <div class="panel-title-group">
        <a class="panel-title-link" href="https://www.oakley-cook.com/obituaries/obituary-listings?page=1" target="_blank" rel="noopener">Oakley-Cook</a>
        <span class="day-badge">WED</span>
      </div>
      <span class="summary-badge loading" id="oc-badge">Loading...</span>
      <span class="panel-chevron">▾</span>
    </div>
    <div class="panel-body">
      <div id="oc-body"><div class="loading-state">Loading...</div></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <img class="fh-logo" src="https://d1q40j6jx1d8h6.cloudfront.net/SiteBuilder/67518621-83f9-4a0d-aa33-7b11c4c73ce9/068b181f-349e-43a2-8451-f771d5b2d275_thumbnail.webp" alt="Akard logo">
      <div class="panel-title-group">
        <a class="panel-title-link" href="https://www.akardfuneralhome.com/obituaries/obituary-listings?page=1" target="_blank" rel="noopener">Akard</a>
        <span class="day-badge">THU</span>
      </div>
      <span class="summary-badge loading" id="ak-badge">Loading...</span>
      <span class="panel-chevron">▾</span>
    </div>
    <div class="panel-body">
      <div id="ak-body"><div class="loading-state">Loading...</div></div>
    </div>
  </div>
</div>

<script>
  const LOOKBACK_DAYS = 30;
  const RECENT_DAYS  = 7;
  const IMG_BASE     = 'https://d1q40j6jx1d8h6.cloudfront.net/';

  // ── Date helpers ───────────────────────────────────────────────────────────

  function parseDate(str) {
    if (!str) return null;
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }
  function fmt(date) {
    if (!date) return '';
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function calcAge(b, d) {
    const born = parseDate(b), died = parseDate(d);
    if (!born || !died) return null;
    let age = died.getFullYear() - born.getFullYear();
    const m = died.getMonth() - born.getMonth();
    if (m < 0 || (m === 0 && died.getDate() < born.getDate())) age--;
    return age >= 0 ? age : null;
  }
  function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
  function isRecent(date, now) {
    if (!date) return false;
    const d = daysBetween(date, now);
    return d >= 0 && d <= RECENT_DAYS;
  }
  function isWithinLookback(date, now) {
    if (!date) return false;
    const d = daysBetween(date, now);
    return d >= 0 && d <= LOOKBACK_DAYS;
  }

  // ── Service event parser ───────────────────────────────────────────────────

  const EVENT_TYPES = [
    { re: /celebration\s+of\s+life/i,                                   label: 'Celebration of Life' },
    { re: /receiving\s+(?:of\s+)?friends|receive\s+friends|visitation|viewing|wake/i, label: 'Visitation' },
    { re: /graveside/i,                                                  label: 'Graveside' },
    { re: /funeral\s+service|funeral/i,                                  label: 'Funeral Service' },
    { re: /memorial\s+service|memorial/i,                                label: 'Memorial Service' },
    { re: /laid\s+to\s+rest|resting\s+place/i,                          label: 'Burial' },
    { re: /committal|entombment|interment|burial/i,                     label: 'Burial' },
    { re: /reception/i,                                                  label: 'Reception' },
    { re: /procession/i,                                                 label: 'Procession' },
  ];

  function splitSentences(text) {
    // Protect common abbreviations before splitting on ". Capital"
    const escaped = text.replace(
      /\b(Dr|Mr|Mrs|Ms|Rev|Prof|St|Ave|Blvd|Rd|Hwy|Mt|Ln|Jr|Sr|Cpl|Sgt|Lt|Col|Gen|Pvt|Cpt|vs)\./gi,
      '$1\x00'
    );
    return escaped
      .split(/\.\s+(?=[A-Z])/)
      .map(s => s.replace(/\x00/g, '.').trim())
      .filter(s => s.length > 10);
  }

  function extractDate(sentence) {
    // Full date: optional weekday + month name + day number + optional year
    const full = sentence.match(
      /(?:(?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),?\s+)?(?:January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s+\d{4})?/i
    );
    if (full) return full[0];
    // Fallback: bare weekday followed by "at", comma, or digit
    const day = sentence.match(
      /\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\b(?=\s*(?:,|\d|\bat\b|$))/i
    );
    return day ? day[0] : '';
  }

  function extractTime(sentence) {
    // "from X to/- Y pm" (no am/pm on first digit)
    const range = sentence.match(
      /from\s+\d{1,2}(?::\d{2})?\s*(?:to|[–\-])\s*\d{1,2}(?::\d{2})?\s*[ap]\.?m\.?/i
    );
    if (range) return range[0];
    // Standard: "7:00 pm" or "5:00 – 7:00 pm"
    const std = sentence.match(
      /\d{1,2}(?::\d{2})?\s*[ap]\.?m\.?(?:\s*[–\-]\s*\d{1,2}(?::\d{2})?\s*[ap]\.?m\.?)?/i
    );
    return std ? std[0] : '';
  }

  function extractLocation(sentence) {
    // Split on " at " or " in ", iterate from end to find first capital-starting non-time segment
    const parts = sentence.split(/\s+(?:at|in)\s+/i);
    for (let i = parts.length - 1; i >= 1; i--) {
      const part = parts[i].trim();
      if (/^\d/.test(part)) continue;                          // skip times
      if (/^https?:|\.com\b|\.org\b|\.net\b/.test(part)) continue; // skip URLs
      if (!/^[A-Z]/.test(part)) continue;                     // must start uppercase
      let loc = part
        .split(/\s+(?:with|for|located|officiated|officiating|prior|during|and\s+the\b)\b/i)[0]
        .replace(/[.,;]?\s*$/, '')
        .trim();
      if (loc.length > 2) return loc;
    }
    return '';
  }

  function parseServiceEvents(description) {
    if (!description) return [];
    const doc = new DOMParser().parseFromString(description, 'text/html');
    const paragraphs = Array.from(doc.querySelectorAll('p, li'))
      .map(el => el.textContent.trim())
      .filter(t => t.length > 10);

    const events = [];
    for (const para of paragraphs) {
      for (const sentence of splitSentences(para)) {
        let label = null;
        for (const { re, label: l } of EVENT_TYPES) {
          if (re.test(sentence)) { label = l; break; }
        }
        if (!label) continue;
        events.push({
          type:     label,
          date:     extractDate(sentence),
          time:     extractTime(sentence),
          location: extractLocation(sentence),
        });
      }
    }

    // Deduplicate: same type + date + time
    const seen = new Set();
    return events.filter(e => {
      const key = `${e.type}|${e.date}|${e.time}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  // ── Card / panel rendering ─────────────────────────────────────────────────

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function obituaryUrl(obit, baseUrl) {
    const name = (obit.FullName || `${obit.FirstName || ''} ${obit.LastName || ''}`)
      .trim().replace(/\s+/g, '-');
    return `${baseUrl}${name}?obId=${obit.Id}`;
  }

  function thumbnailUrl(obit) {
    if (!obit.ThumbnailUrl) return null;
    return IMG_BASE + obit.ThumbnailUrl.replace(/\.jpg$/i, '.webp');
  }

  function descriptionToText(html) {
    if (!html) return '';
    const doc = new DOMParser().parseFromString(html, 'text/html');
    return Array.from(doc.querySelectorAll('p'))
      .map(p => p.textContent.trim())
      .filter(t => t.length > 0)
      .join('\n\n');
  }

  function renderCard(obit, now, highlight, baseUrl) {
    const death     = parseDate(obit.DeathDate);
    const lastSvc   = parseDate(obit.LastServiceDate);
    const hasRecent = isRecent(lastSvc, now);
    const age       = calcAge(obit.BirthDate, obit.DeathDate);
    const thumb     = thumbnailUrl(obit);
    const url       = baseUrl ? obituaryUrl(obit, baseUrl) : (obit.StoreUrl || '#');
    const events    = parseServiceEvents(obit.Description);

    const metaParts = [];
    if (death) metaParts.push(`Died ${fmt(death)}`);
    if (age != null) metaParts.push(`Age ${age}`);
    if (obit.PlaceOfResidence) metaParts.push(escHtml(obit.PlaceOfResidence));

    const photoHtml = thumb
      ? `<img class="obit-photo" src="${escHtml(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : '';

    let svcHtml = '';
    if (events.length > 0) {
      let rows = '';
      for (const e of events) {
        rows += `<tr>
          <td class="svc-type">${escHtml(e.type)}</td>
          <td class="svc-date">${escHtml(e.date)}</td>
          <td class="svc-time">${escHtml(e.time)}</td>
          <td class="svc-loc">${escHtml(e.location)}</td>
        </tr>`;
      }
      svcHtml = `<div class="svc-wrap">
        <table class="svc-table">
          <thead><tr>
            <th>Event</th><th>Date</th><th>Time</th><th>Location</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    } else if (lastSvc) {
      svcHtml = `<div class="svc-wrap">
        <table class="svc-table">
          <thead><tr><th>Event</th><th>Date</th><th>Time</th><th>Location</th></tr></thead>
          <tbody><tr>
            <td class="svc-type">Service</td>
            <td class="svc-date">${escHtml(fmt(lastSvc))}</td>
            <td class="svc-time"></td>
            <td class="svc-loc">${escHtml(obit.ServingLocationName || '')}</td>
          </tr></tbody>
        </table>
      </div>`;
    } else {
      svcHtml = '<div class="no-services">No service details found</div>';
    }

    const fullText = descriptionToText(obit.Description);
    const fullSection = fullText
      ? `<details class="obit-full">
          <summary>Full Obituary</summary>
          <div class="obit-full-text">${escHtml(fullText)}</div>
        </details>`
      : '';

    return `<a class="obit-card${highlight && hasRecent ? ' recent' : ''}" href="${escHtml(url)}" target="_blank" rel="noopener">
      <div class="obit-header">
        ${photoHtml}
        <div class="obit-info">
          <div class="obit-name">${escHtml(obit.FullName || `${obit.FirstName || ''} ${obit.LastName || ''}`.trim())}</div>
          <div class="obit-meta">${metaParts.join(' · ')}</div>
        </div>
      </div>
      ${svcHtml}
      ${fullSection}
    </a>`;
  }

  function renderPanel(bodyEl, badgeEl, obituaries, baseUrl) {
    const now = new Date();
    now.setHours(23, 59, 59, 999);

    const relevant = obituaries
      .filter(o => isWithinLookback(parseDate(o.DeathDate), now))
      .sort((a, b) => (parseDate(b.DeathDate) || 0) - (parseDate(a.DeathDate) || 0));

    const recentCount = relevant.filter(o => isRecent(parseDate(o.LastServiceDate), now)).length;
    badgeEl.textContent = recentCount > 0
      ? `${recentCount} service${recentCount > 1 ? 's' : ''} this week`
      : 'No services this week';
    badgeEl.className = 'summary-badge ' + (recentCount > 0 ? 'alert' : 'clean');

    if (relevant.length === 0) {
      bodyEl.innerHTML = '<div class="empty-state">No recent obituaries found.</div>';
      return;
    }

    const thisWeek = relevant.filter(o => isRecent(parseDate(o.LastServiceDate), now));
    const older    = relevant.filter(o => !isRecent(parseDate(o.LastServiceDate), now));

    let html = '';
    if (thisWeek.length > 0) {
      html += '<div class="week-section-label">Services This Week</div><div class="obit-list">';
      for (const o of thisWeek) html += renderCard(o, now, true, baseUrl);
      html += '</div>';
    }
    if (older.length > 0) {
      html += '<div class="older-section-label">Older (past 30 days)</div><div class="obit-list">';
      for (const o of older) html += renderCard(o, now, false, baseUrl);
      html += '</div>';
    }
    bodyEl.innerHTML = html;
  }

  async function loadPanel(endpoint, bodyEl, badgeEl, baseUrl) {
    try {
      const res  = await fetch(endpoint);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const list = Array.isArray(data) ? data : (data.Obituaries || data.obituaries || []);
      renderPanel(bodyEl, badgeEl, list, baseUrl);
    } catch (err) {
      bodyEl.innerHTML = `<div class="error-state">Error: ${escHtml(err.message)}</div>`;
      badgeEl.textContent = 'Error';
      badgeEl.className = 'summary-badge loading';
    }
  }

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

  // Mobile panel collapse: tap header to toggle
  document.querySelectorAll('.panel-header').forEach(header => {
    header.addEventListener('click', e => {
      if (window.innerWidth > 640) return;
      // Don't collapse when tapping the title link
      if (e.target.closest('.panel-title-link')) return;
      header.closest('.panel').classList.toggle('expanded');
    });
  });

  // Prevent <details> toggle from navigating the card link
  document.addEventListener('click', e => {
    const details = e.target.closest('.obit-full');
    if (details) e.preventDefault();
  });

  loadPanel('/api/oakley-cook', document.getElementById('oc-body'), document.getElementById('oc-badge'), 'https://www.oakley-cook.com/obituaries/');
  loadPanel('/api/akard',       document.getElementById('ak-body'), document.getElementById('ak-badge'), 'https://www.akardfuneralhome.com/obituaries/');
</script>
