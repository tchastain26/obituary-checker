<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obituary Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0C18;
      --surface: rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.10);
      --card-bg: #1C1B2E;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.55);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #E8E6F2;
      --text-muted: rgba(232,230,242,0.65);
      --text-dim: rgba(232,230,242,0.38);
      --radius: 14px;
      --radius-sm: 8px;
      --green: #34D399;
      --green-bg: rgba(52,211,153,0.12);
      --green-border: rgba(52,211,153,0.25);
      --orange: #FB923C;
      --orange-bg: rgba(251,146,60,0.12);
      --orange-border: rgba(251,146,60,0.30);
      --red: #F87171;
      --red-bg: rgba(248,113,113,0.12);
      --red-border: rgba(248,113,113,0.30);
      --blue: #60A5FA;
      --teal: #2DD4BF;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F0EEF8;
        --surface: rgba(0,0,0,0.04);
        --surface-hover: rgba(0,0,0,0.07);
        --card-bg: #FFFFFF;
        --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.18);
        --text: #1C1B2E;
        --text-muted: rgba(28,27,46,0.68);
        --text-dim: rgba(28,27,46,0.42);
        --green-bg: rgba(5,150,105,0.08);
        --green-border: rgba(5,150,105,0.20);
        --orange-bg: rgba(234,88,12,0.08);
        --orange-border: rgba(234,88,12,0.22);
        --red-bg: rgba(220,38,38,0.08);
        --red-border: rgba(220,38,38,0.22);
        --blue: #2563EB;
        --teal: #0D9488;
        --red: #DC2626;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 20px;
    }

    header {
      max-width: 1160px; margin: 0 auto 24px;
      display: flex; align-items: baseline; gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.8rem; color: var(--text-dim); }

    /* ── Page layout ─────────────────────────────────────────────────────── */

    /* Mobile: calendar top, then panels stacked */
    .page-grid {
      max-width: 1160px; margin: 0 auto;
      display: grid; gap: 20px;
      grid-template-columns: 1fr;
      grid-template-areas: "cal" "oc" "ak";
    }

    /* Tablet: calendar spans top, panels side-by-side */
    @media (min-width: 641px) {
      .page-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: "cal cal" "oc ak";
      }
    }

    /* Desktop: panels + sticky calendar sidebar */
    @media (min-width: 900px) {
      .page-grid {
        grid-template-columns: 1fr 1fr 240px;
        grid-template-areas: "oc ak cal";
      }
      .cal-sidebar {
        position: sticky;
        top: 24px;
        align-self: start;
      }
    }

    .oc-panel  { grid-area: oc; }
    .ak-panel  { grid-area: ak; }
    .cal-sidebar { grid-area: cal; }

    /* ── Panel card ──────────────────────────────────────────────────────── */

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    .fh-logo {
      width: 36px; height: 36px; border-radius: 6px;
      object-fit: contain; flex-shrink: 0;
      background: white; padding: 3px;
    }

    .panel-title-group { flex: 1; display: flex; flex-direction: column; gap: 1px; min-width: 0; }

    .panel-title-link {
      font-size: 1rem; font-weight: 600; color: var(--text);
      text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .panel-title-link:hover { text-decoration: underline; text-underline-offset: 3px; }

    .day-badge { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; color: var(--text-dim); }

    .summary-badge {
      font-size: 0.75rem; font-weight: 600;
      padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
    }
    .summary-badge.clean  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .summary-badge.alert  { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .summary-badge.loading { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }

    /* Mobile panel collapse */
    .panel-chevron {
      display: none; font-size: 1rem; color: var(--text-dim);
      margin-left: 4px; flex-shrink: 0; transition: transform 0.2s;
    }
    @media (max-width: 640px) {
      .panel-header { cursor: pointer; user-select: none; }
      .panel-chevron { display: block; }
      .panel-body { display: none; }
      .panel.expanded .panel-body { display: block; }
      .panel.expanded .panel-chevron { transform: rotate(180deg); }
    }

    /* ── Section labels ──────────────────────────────────────────────────── */

    .week-section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--orange); padding: 10px 14px 3px;
    }
    .older-section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text-dim); padding: 10px 14px 3px;
    }

    /* ── Obit card ───────────────────────────────────────────────────────── */

    .obit-list { padding: 6px 10px 10px; display: flex; flex-direction: column; gap: 8px; }

    .obit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .obit-card:hover { border-color: var(--border-hover); }
    .obit-card.recent { background: var(--orange-bg); border-color: var(--orange-border); }

    .obit-top-link {
      display: block; text-decoration: none; color: inherit;
      padding: 11px 12px 0;
    }
    .obit-top-link:hover .obit-name { text-decoration: underline; text-underline-offset: 2px; }

    .obit-header { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }

    .obit-photo {
      width: 44px; height: 56px; object-fit: cover;
      border-radius: 4px; flex-shrink: 0; background: var(--surface);
    }

    .obit-info { flex: 1; min-width: 0; padding-top: 1px; }
    .obit-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; }
    .obit-meta { font-size: 0.72rem; color: var(--text-dim); line-height: 1.5; }

    /* ── Highlighted service sentences ──────────────────────────────────── */

    .svc-lines { padding: 0 0 10px; }
    .svc-line  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; padding: 1px 0; }
    .hl-date   { color: var(--blue);   font-weight: 600; }
    .hl-time   { color: var(--teal);   font-weight: 600; }
    .hl-loc    { color: var(--orange); font-weight: 500; }

    /* ── Service details table (lazy-loaded) ─────────────────────────────── */

    .svc-table {
      width: 100%; border-collapse: collapse; font-size: 0.74rem;
    }
    .svc-table thead th {
      text-align: left; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-dim); padding: 0 8px 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .svc-table tbody tr { border-top: 1px solid var(--border); }
    .svc-table tbody tr:first-child { border-top: none; }
    .svc-table td { padding: 5px 8px 5px 0; vertical-align: top; line-height: 1.4; }
    .svc-type  { font-weight: 600; color: var(--text); white-space: nowrap; }
    .svc-date  { color: var(--blue);   white-space: nowrap; }
    .svc-time  { color: var(--teal);   white-space: nowrap; }
    .svc-loc   { color: var(--orange); }
    .svc-addr  { font-size: 0.7rem; color: var(--text-dim); margin-top: 1px; }

    /* ── Collapsible sections (shared) ───────────────────────────────────── */

    .obit-detail {
      border-top: 1px solid var(--border); padding: 0 12px 10px;
    }
    .obit-detail summary {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-dim);
      cursor: pointer; user-select: none; padding: 8px 0 0;
      list-style: none; display: flex; align-items: center; gap: 4px;
    }
    .obit-detail summary::-webkit-details-marker { display: none; }
    .obit-detail summary::after { content: '▾'; }
    .obit-detail[open] summary::after { content: '▴'; }
    .obit-detail-body { margin-top: 8px; }

    .obit-full-text {
      font-size: 0.75rem; color: var(--text-muted);
      line-height: 1.65; white-space: pre-wrap;
    }
    .svc-detail-loading { font-size: 0.75rem; color: var(--text-dim); font-style: italic; }
    .svc-detail-error   { font-size: 0.75rem; color: var(--red); }

    .no-services { font-size: 0.75rem; color: var(--text-dim); font-style: italic; padding: 0 12px 10px; }
    .empty-state  { padding: 32px 18px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }
    .error-state  { padding: 20px 18px; font-size: 0.82rem; color: var(--red); }
    .loading-state { padding: 32px 18px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }

    /* ── Calendar widget ─────────────────────────────────────────────────── */

    .cal-widget {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .cal-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .cal-month-label { font-size: 0.88rem; font-weight: 600; }

    .cal-nav {
      background: none; border: none;
      color: var(--text-muted); font-size: 1.1rem;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .cal-nav:hover { color: var(--text); }

    .cal-dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 8px 10px 2px; gap: 2px;
    }
    .cal-dow-row span {
      text-align: center; font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-dim);
    }
    .cal-dow-row .wd-end { color: var(--red); opacity: 0.75; }

    .cal-days {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 2px 10px 12px; gap: 1px;
    }

    .cal-day {
      position: relative; text-align: center;
      font-size: 0.78rem; padding: 5px 2px 3px;
      border-radius: 5px; color: var(--text); line-height: 1;
      cursor: default;
    }
    .cal-day-other  { color: var(--text-dim); }
    .cal-day-weekend { color: var(--red); }
    .cal-day-other.cal-day-weekend { color: var(--red); opacity: 0.4; }

    .cal-day-today {
      background: rgba(255,255,255,0.12);
      font-weight: 700;
    }
    @media (prefers-color-scheme: light) {
      .cal-day-today { background: rgba(0,0,0,0.08); }
    }

    /* Orange dot below date for days with a service */
    .cal-day-service::after {
      content: '';
      display: block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--orange);
      margin: 2px auto 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Obituary Checker</h1>
  <span id="last-updated"></span>
</header>

<div class="page-grid">

  <!-- ── Oakley-Cook panel ──────────────────────────────────────────────── -->
  <div class="panel oc-panel">
    <div class="panel-header">
      <img class="fh-logo" src="https://d1q40j6jx1d8h6.cloudfront.net/SiteBuilder/ac386460-9069-4d71-8a48-0a6ab1f5f511/562b11ff-74cb-4d66-b951-c27101f19437_thumbnail.webp" alt="Oakley-Cook logo">
      <div class="panel-title-group">
        <a class="panel-title-link" href="https://www.oakley-cook.com/obituaries/obituary-listings?page=1" target="_blank" rel="noopener">Oakley-Cook</a>
        <span class="day-badge">WED</span>
      </div>
      <span class="summary-badge loading" id="oc-badge">Loading...</span>
      <span class="panel-chevron">▾</span>
    </div>
    <div class="panel-body">
      <div id="oc-body"><div class="loading-state">Loading...</div></div>
    </div>
  </div>

  <!-- ── Akard panel ────────────────────────────────────────────────────── -->
  <div class="panel ak-panel">
    <div class="panel-header">
      <img class="fh-logo" src="https://d1q40j6jx1d8h6.cloudfront.net/SiteBuilder/67518621-83f9-4a0d-aa33-7b11c4c73ce9/068b181f-349e-43a2-8451-f771d5b2d275_thumbnail.webp" alt="Akard logo">
      <div class="panel-title-group">
        <a class="panel-title-link" href="https://www.akardfuneralhome.com/obituaries/obituary-listings?page=1" target="_blank" rel="noopener">Akard</a>
        <span class="day-badge">THU</span>
      </div>
      <span class="summary-badge loading" id="ak-badge">Loading...</span>
      <span class="panel-chevron">▾</span>
    </div>
    <div class="panel-body">
      <div id="ak-body"><div class="loading-state">Loading...</div></div>
    </div>
  </div>

  <!-- ── Calendar sidebar ───────────────────────────────────────────────── -->
  <div class="cal-sidebar">
    <div class="cal-widget">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev" aria-label="Previous month">&#8249;</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav" id="cal-next" aria-label="Next month">&#8250;</button>
      </div>
      <div class="cal-dow-row">
        <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span>
        <span class="wd-end">Sa</span><span class="wd-end">Su</span>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>

</div><!-- .page-grid -->

<script>
  const LOOKBACK_DAYS = 30;
  const RECENT_DAYS  = 7;
  const IMG_BASE     = 'https://d1q40j6jx1d8h6.cloudfront.net/';

  // ── Helpers ───────────────────────────────────────────────────────────────

  function parseDate(str) {
    if (!str) return null;
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }
  function fmt(date) {
    if (!date) return '';
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function calcAge(b, d) {
    const born = parseDate(b), died = parseDate(d);
    if (!born || !died) return null;
    let age = died.getFullYear() - born.getFullYear();
    const m = died.getMonth() - born.getMonth();
    if (m < 0 || (m === 0 && died.getDate() < born.getDate())) age--;
    return age >= 0 ? age : null;
  }
  function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
  function isRecent(date, now) {
    if (!date) return false;
    const d = daysBetween(date, now);
    return d >= 0 && d <= RECENT_DAYS;
  }
  function isWithinLookback(date, now) {
    if (!date) return false;
    const d = daysBetween(date, now);
    return d >= 0 && d <= LOOKBACK_DAYS;
  }
  function isoDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Calendar ──────────────────────────────────────────────────────────────

  const calState = {
    year:  new Date().getFullYear(),
    month: new Date().getMonth(),   // 0-indexed
    serviceDates: new Set(),        // "YYYY-MM-DD" strings
  };

  function addServiceDates(obituaries) {
    for (const o of obituaries) {
      if (o.LastServiceDate) {
        const d = parseDate(o.LastServiceDate);
        if (d) calState.serviceDates.add(isoDate(d));
      }
    }
    renderCalendar();
  }

  function renderCalendar() {
    const { year, month, serviceDates } = calState;
    const today = new Date();

    document.getElementById('cal-month-label').textContent =
      new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const firstDow  = new Date(year, month, 1).getDay();          // Sun=0
    const startSlot = firstDow === 0 ? 6 : firstDow - 1;         // Mon=0 offset
    const lastDate  = new Date(year, month + 1, 0).getDate();
    const prevLast  = new Date(year, month, 0).getDate();

    const cells = [];

    // Prev-month tail
    for (let i = startSlot - 1; i >= 0; i--) {
      const m = month === 0 ? 11 : month - 1;
      const y = month === 0 ? year - 1 : year;
      cells.push({ day: prevLast - i, month: m, year: y, current: false });
    }
    // Current month
    for (let d = 1; d <= lastDate; d++) {
      cells.push({ day: d, month, year, current: true });
    }
    // Next-month fill to complete last row
    let nd = 1;
    while (cells.length % 7 !== 0) {
      const m = month === 11 ? 0 : month + 1;
      const y = month === 11 ? year + 1 : year;
      cells.push({ day: nd++, month: m, year: y, current: false });
    }

    const html = cells.map(({ day, month: m, year: y, current }) => {
      const date   = new Date(y, m, day);
      const dow    = date.getDay();                     // 0=Sun, 6=Sat
      const wkend  = dow === 0 || dow === 6;
      const isToday= y === today.getFullYear() && m === today.getMonth() && day === today.getDate();
      const key    = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const hasSvc = serviceDates.has(key);

      let cls = 'cal-day';
      if (!current) cls += ' cal-day-other';
      if (wkend)    cls += ' cal-day-weekend';
      if (isToday)  cls += ' cal-day-today';
      if (hasSvc)   cls += ' cal-day-service';

      return `<div class="${cls}" title="${hasSvc ? 'Service day' : ''}">${day}</div>`;
    }).join('');

    document.getElementById('cal-days').innerHTML = html;
  }

  document.getElementById('cal-prev').addEventListener('click', () => {
    if (calState.month === 0) { calState.month = 11; calState.year--; }
    else calState.month--;
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    if (calState.month === 11) { calState.month = 0; calState.year++; }
    else calState.month++;
    renderCalendar();
  });

  renderCalendar(); // render immediately before API data arrives

  // ── Service text highlighting ─────────────────────────────────────────────

  const SVC_KW = /visitation|viewing|wake|receive\s+friends|receiving|graveside|funeral|burial|interment|committal|memorial|resting|procession|reception|celebration\s+of\s+life|laid\s+to\s+rest/i;

  const HL_PATTERNS = [
    // Date: optional weekday + month + day + optional year
    { re: /(?:(?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),?\s+)?(?:January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s+\d{4})?/gi, cls: 'hl-date' },
    // Time: "7:00 pm", "5:00 – 7:00 pm", "noon"
    { re: /\b(?:noon|midnight|\d{1,4}(?::\d{2})?\s*[ap]\.?\s*m\.?(?:\s*[–\-]\s*\d{1,4}(?::\d{2})?\s*[ap]\.?\s*m\.?)?)/gi, cls: 'hl-time' },
    // Location: "at Chapel/Funeral Home/Cemetery..."
    { re: /\bat\s+[A-Z][^.,;\n]*/g, cls: 'hl-loc' },
  ];

  function highlightServiceText(text) {
    const marks = [];
    for (const { re, cls } of HL_PATTERNS) {
      re.lastIndex = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        marks.push({ start: m.index, end: m.index + m[0].length, cls });
      }
    }
    marks.sort((a, b) => a.start - b.start);
    const resolved = [];
    let cursor = 0;
    for (const mark of marks) {
      if (mark.start >= cursor) { resolved.push(mark); cursor = mark.end; }
    }
    let html = '', pos = 0;
    for (const { start, end, cls } of resolved) {
      html += escHtml(text.slice(pos, start));
      html += `<span class="${cls}">${escHtml(text.slice(start, end))}</span>`;
      pos = end;
    }
    return html + escHtml(text.slice(pos));
  }

  function serviceLines(description) {
    if (!description) return [];
    const doc = new DOMParser().parseFromString(description, 'text/html');
    return Array.from(doc.querySelectorAll('p, li'))
      .map(el => el.textContent.trim())
      .filter(t => t.length > 15 && SVC_KW.test(t));
  }

  // ── Service details (lazy-loaded from GetObituaryInfo API) ────────────────

  function fmtIsoTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return isNaN(d) ? '' : d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function fmtIsoDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function renderServiceTable(services, cemetery) {
    const rows = services.map(svc => {
      const name  = escHtml(svc.ServiceEventName || '');
      const date  = escHtml(fmtIsoDate(svc.StartTime));
      const start = fmtIsoTime(svc.StartTime);
      const end   = fmtIsoTime(svc.EndTime);
      const time  = escHtml(start && end ? `${start} – ${end}` : start);
      const loc   = svc.ServiceLocation || {};
      const locName = escHtml(loc.Name || '');
      const addr    = escHtml(loc.AddressDetails || '');
      return `<tr>
        <td class="svc-type">${name}</td>
        <td class="svc-date">${date}</td>
        <td class="svc-time">${time}</td>
        <td class="svc-loc">${locName}${addr ? `<div class="svc-addr">${addr}</div>` : ''}</td>
      </tr>`;
    });

    if (cemetery) {
      const addr = escHtml(cemetery.AddressDetails || '');
      rows.push(`<tr>
        <td class="svc-type">Final Resting Place</td>
        <td class="svc-date"></td>
        <td class="svc-time"></td>
        <td class="svc-loc">${escHtml(cemetery.Name || '')}${addr ? `<div class="svc-addr">${addr}</div>` : ''}</td>
      </tr>`);
    }

    if (!rows.length) return '<div class="svc-detail-error">No service events found.</div>';

    return `<table class="svc-table">
      <thead><tr><th>Event</th><th>Date</th><th>Time</th><th>Location</th></tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
  }

  function attachServiceDetails(bodyEl, src) {
    bodyEl.querySelectorAll('.svc-detail-trigger').forEach(details => {
      details.addEventListener('toggle', async function onToggle() {
        if (!this.open) return;
        this.removeEventListener('toggle', onToggle);
        const body = this.querySelector('.obit-detail-body');
        const obId = this.dataset.obId;
        body.innerHTML = '<div class="svc-detail-loading">Loading...</div>';
        try {
          const res = await fetch(`/api/obituary-info?obituaryId=${encodeURIComponent(obId)}&src=${encodeURIComponent(src)}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { services, cemetery } = await res.json();
          body.innerHTML = renderServiceTable(services, cemetery);
        } catch (err) {
          body.innerHTML = `<div class="svc-detail-error">Could not load: ${escHtml(err.message)}</div>`;
        }
      });
    });
  }

  // ── Card / panel rendering ────────────────────────────────────────────────

  function obituaryUrl(obit, baseUrl) {
    const name = (obit.FullName || `${obit.FirstName || ''} ${obit.LastName || ''}`)
      .trim().replace(/\s+/g, '-');
    return `${baseUrl}${name}?obId=${obit.Id}`;
  }

  function thumbnailUrl(obit) {
    if (!obit.ThumbnailUrl) return null;
    return IMG_BASE + obit.ThumbnailUrl.replace(/\.jpg$/i, '.webp');
  }

  function descriptionToText(html) {
    if (!html) return '';
    const doc = new DOMParser().parseFromString(html, 'text/html');
    return Array.from(doc.querySelectorAll('p'))
      .map(p => p.textContent.trim()).filter(t => t.length > 0).join('\n\n');
  }

  function renderCard(obit, now, highlight, baseUrl) {
    const death     = parseDate(obit.DeathDate);
    const lastSvc   = parseDate(obit.LastServiceDate);
    const hasRecent = isRecent(lastSvc, now);
    const age       = calcAge(obit.BirthDate, obit.DeathDate);
    const thumb     = thumbnailUrl(obit);
    const url       = baseUrl ? obituaryUrl(obit, baseUrl) : (obit.StoreUrl || '#');
    const lines     = serviceLines(obit.Description);

    const metaParts = [];
    if (death) metaParts.push(`Died ${fmt(death)}`);
    if (age != null) metaParts.push(`Age ${age}`);
    if (obit.PlaceOfResidence) metaParts.push(escHtml(obit.PlaceOfResidence));

    const photoHtml = thumb
      ? `<img class="obit-photo" src="${escHtml(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : '';

    // Highlighted service sentences
    let svcHtml = '';
    if (lines.length > 0) {
      const lineHtml = lines.map(l => `<div class="svc-line">${highlightServiceText(l)}</div>`).join('');
      svcHtml = `<div class="svc-lines">${lineHtml}</div>`;
    }

    // Service Details collapsible (lazy-loaded)
    const detailSection = `<details class="obit-detail svc-detail-trigger" data-ob-id="${escHtml(String(obit.Id))}">
      <summary>Service Details</summary>
      <div class="obit-detail-body"></div>
    </details>`;

    // Full Obituary collapsible
    const fullText = descriptionToText(obit.Description);
    const fullSection = fullText
      ? `<details class="obit-detail">
          <summary>Full Obituary</summary>
          <div class="obit-detail-body obit-full-text">${escHtml(fullText)}</div>
        </details>`
      : '';

    const name = escHtml(obit.FullName || `${obit.FirstName || ''} ${obit.LastName || ''}`.trim());

    return `<div class="obit-card${highlight && hasRecent ? ' recent' : ''}">
      <a class="obit-top-link" href="${escHtml(url)}" target="_blank" rel="noopener">
        <div class="obit-header">
          ${photoHtml}
          <div class="obit-info">
            <div class="obit-name">${name}</div>
            <div class="obit-meta">${metaParts.join(' · ')}</div>
          </div>
        </div>
        ${svcHtml}
      </a>
      ${detailSection}
      ${fullSection}
    </div>`;
  }

  function renderPanel(bodyEl, badgeEl, obituaries, baseUrl, src) {
    const now = new Date();
    now.setHours(23, 59, 59, 999);

    const relevant = obituaries
      .filter(o => isWithinLookback(parseDate(o.DeathDate), now))
      .sort((a, b) => (parseDate(b.DeathDate) || 0) - (parseDate(a.DeathDate) || 0));

    const recentCount = relevant.filter(o => isRecent(parseDate(o.LastServiceDate), now)).length;
    badgeEl.textContent = recentCount > 0
      ? `${recentCount} service${recentCount > 1 ? 's' : ''} this week`
      : 'No services this week';
    badgeEl.className = 'summary-badge ' + (recentCount > 0 ? 'alert' : 'clean');

    if (relevant.length === 0) {
      bodyEl.innerHTML = '<div class="empty-state">No recent obituaries found.</div>';
      return;
    }

    const thisWeek = relevant.filter(o => isRecent(parseDate(o.LastServiceDate), now));
    const older    = relevant.filter(o => !isRecent(parseDate(o.LastServiceDate), now));

    let html = '';
    if (thisWeek.length > 0) {
      html += '<div class="week-section-label">Services This Week</div><div class="obit-list">';
      for (const o of thisWeek) html += renderCard(o, now, true, baseUrl);
      html += '</div>';
    }
    if (older.length > 0) {
      html += '<div class="older-section-label">Older (past 30 days)</div><div class="obit-list">';
      for (const o of older) html += renderCard(o, now, false, baseUrl);
      html += '</div>';
    }
    bodyEl.innerHTML = html;
    attachServiceDetails(bodyEl, src);
  }

  async function loadPanel(endpoint, bodyEl, badgeEl, baseUrl, src) {
    try {
      const res  = await fetch(endpoint);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const list = Array.isArray(data) ? data : (data.Obituaries || data.obituaries || []);
      renderPanel(bodyEl, badgeEl, list, baseUrl, src);
      addServiceDates(list);
    } catch (err) {
      bodyEl.innerHTML = `<div class="error-state">Error: ${escHtml(err.message)}</div>`;
      badgeEl.textContent = 'Error';
      badgeEl.className = 'summary-badge loading';
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

  document.querySelectorAll('.panel-header').forEach(header => {
    header.addEventListener('click', e => {
      if (window.innerWidth > 640) return;
      if (e.target.closest('.panel-title-link')) return;
      header.closest('.panel').classList.toggle('expanded');
    });
  });

  loadPanel('/api/oakley-cook', document.getElementById('oc-body'), document.getElementById('oc-badge'), 'https://www.oakley-cook.com/obituaries/', 'oakley-cook');
  loadPanel('/api/akard',       document.getElementById('ak-body'), document.getElementById('ak-badge'), 'https://www.akardfuneralhome.com/obituaries/', 'akard');
</script>
</body>
</html>
